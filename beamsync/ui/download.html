<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BeamSync Downlink</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono:wght@700&display=swap');

        :root {
            --nb-bg: #F5F0E8;
            --nb-surface: #FFFFFF;
            --nb-text: #0C1120;
            --nb-text-muted: #64748B;
            --nb-primary: #1A56FF;
            --nb-secondary: #FF7A00;
            --nb-secondary-text: #0A0A0A;
            --nb-border-color: #2D3F5E;
            --nb-border: 2px solid var(--nb-border-color);
            --nb-shadow: 4px 4px 0px #08101E;
            --nb-shadow-hover: 6px 6px 0px #08101E;
            --nb-radius: 0px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --nb-bg: #0C1120;
                --nb-surface: #141E30;
                --nb-text: #E2E8F0;
            }
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--nb-bg);
            color: var(--nb-text);
            font-family: 'Space Mono', monospace;
            margin: 0;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            background: var(--nb-surface);
            border: var(--nb-border);
            box-shadow: var(--nb-shadow);
            padding: 32px 20px;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            padding-bottom: 24px;
            margin-bottom: 24px;
            border-bottom: var(--nb-border);
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 800;
            margin: 0 0 8px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
        }

        h1 svg {
            color: var(--nb-primary);
        }

        .subtitle {
            font-size: 13px;
            font-weight: bold;
            color: var(--nb-text-muted);
        }

        .file-card {
            border: var(--nb-border);
            background: var(--nb-bg);
            margin-bottom: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: left;
            transition: transform 0.1s;
        }

        .file-card:hover {
            transform: translate(2px, 2px);
        }

        .file-info {
            flex: 1;
            font-size: 14px;
            font-weight: bold;
            word-break: break-all;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .download-btn {
            background: var(--nb-primary);
            color: #FFFFFF;
            border: var(--nb-border);
            padding: 10px 16px;
            font-size: 14px;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            flex-shrink: 0;
            box-shadow: 2px 2px 0px #08101E;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .download-btn:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0px #08101E;
        }

        .empty-msg {
            text-align: center;
            color: var(--nb-text-muted);
            margin-top: 40px;
            font-size: 14px;
            font-weight: bold;
        }

        .progress-block {
            border: var(--nb-border);
            background: var(--nb-surface);
            padding: 16px;
            margin-bottom: 24px;
            display: none;
            text-align: left;
        }

        .progress-block.active {
            display: block;
        }

        .progress-header {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 12px;
        }

        .progress-icon {
            font-size: 20px;
            flex-shrink: 0;
        }

        .progress-info {
            flex: 1;
        }

        .progress-name {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 6px;
            word-break: break-word;
        }

        .progress-meta {
            font-size: 12px;
            color: var(--nb-text-muted);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .progress-meta__item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: bold;
        }

        .speed-indicator {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: var(--nb-primary);
        }

        .speed-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 1s alternate infinite;
        }

        @keyframes pulse {
            from { opacity: 0.3; }
            to { opacity: 1; }
        }

        .progress-bar-track {
            height: 12px;
            background: var(--nb-bg);
            border: var(--nb-border);
            margin-bottom: 8px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--nb-primary);
            transition: width 0.2s linear;
        }

        .progress-percentage {
            font-size: 18px;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            color: var(--nb-primary);
            margin-left: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>
                <img src="/logo.png" width="32" height="32" alt="BeamSync Logo" style="border-radius: 4px;">
                BeamSync
            </h1>
            <div class="subtitle">TAP TO SAVE FILES LOCALLY</div>
        </header>

        <div id="progress-container" class="progress-block">
            <div class="progress-header">
                <span class="progress-icon">⬇️</span>
                <div class="progress-info">
                    <div class="progress-name" id="progress-filename">—</div>
                    <div class="progress-meta">
                        <div class="progress-meta__item">
                            <span id="progress-size">0.00 MB / 0.00 MB</span>
                        </div>
                        <div class="progress-meta__item">
                            <span class="speed-indicator">
                                <span class="speed-dot" id="speed-dot"></span>
                                <span id="progress-speed">0.00 MB/s</span>
                            </span>
                        </div>
                        <div class="progress-meta__item">
                            <span>⏱️ <span id="progress-elapsed">0s</span></span>
                            <span>⌛ <span id="progress-remaining">—</span></span>
                        </div>
                    </div>
                </div>
                <div class="progress-percentage"><span id="progress-pct">0</span>%</div>
            </div>
            <div class="progress-bar-track">
                <div class="progress-bar-fill" id="progress-bar" style="width: 0%"></div>
            </div>
        </div>

        <div id="file-list">
            {{FILES}}
        </div>
    </div>

    <script>
        // Token is embedded directly into the HTML by the Go server:
        const TOKEN = "{{TOKEN}}";

        // ── Progress tracking state ──────────────────────────────────────────
        let progressState = {
            startTime: 0,
            lastUpdateTime: 0,
            lastBytes: 0,
            speedHistory: [],
        };

        // Helper to format time
        const formatTime = (seconds) => {
            if (isNaN(seconds) || !isFinite(seconds)) return "—";
            if (seconds < 0) return "—";
            if (seconds < 60) return `${Math.round(seconds)}s`;
            const mins = Math.floor(seconds / 60);
            const secs = Math.round(seconds % 60);
            if (mins < 60) return `${mins}m ${secs}s`;
            const hours = Math.floor(mins / 60);
            const remainMins = mins % 60;
            return `${hours}h ${remainMins}m`;
        };

        // Helper to get speed color
        const getSpeedColor = (speedMBps) => {
            if (speedMBps > 10) return "#00ff41"; // Green
            if (speedMBps > 5) return "#ffb000"; // Orange
            return "#ff4444"; // Red
        };

        // Helper to smooth speed using rolling average
        const smoothSpeed = (currentSpeed) => {
            progressState.speedHistory.push(currentSpeed);
            if (progressState.speedHistory.length > 10) progressState.speedHistory.shift();
            return progressState.speedHistory.reduce((a, b) => a + b, 0) / progressState.speedHistory.length;
        };

        // Update progress display
        const updateProgress = (filename, loaded, total) => {
            const container = document.getElementById('progress-container');
            container.classList.add('active');

            const now = performance.now();

            // Initialize on first call
            if (progressState.startTime === 0) {
                progressState.startTime = now;
                progressState.lastUpdateTime = now;
                progressState.lastBytes = 0;
            }

            // Calculate metrics
            const elapsed = (now - progressState.startTime) / 1000;
            const dt = (now - progressState.lastUpdateTime) / 1000;
            const instantSpeed = dt > 0 ? (loaded - progressState.lastBytes) / dt / 1048576 : 0;
            const smoothedSpeed = smoothSpeed(Math.max(0, instantSpeed));
            const percent = total > 0 ? Math.round((loaded / total) * 100) : 0;

            // Calculate ETA
            let timeRemaining = "—";
            if (smoothedSpeed > 0) {
                const remainingBytes = total - loaded;
                const secondsRemaining = remainingBytes / (smoothedSpeed * 1048576);
                timeRemaining = formatTime(secondsRemaining);
            }

            // Update UI
            document.getElementById('progress-filename').textContent = filename;
            document.getElementById('progress-size').textContent = 
                `${(loaded / 1048576).toFixed(2)} MB / ${(total / 1048576).toFixed(2)} MB`;
            document.getElementById('progress-speed').textContent = `${Math.max(0, smoothedSpeed).toFixed(2)} MB/s`;
            document.getElementById('progress-pct').textContent = percent;
            document.getElementById('progress-bar').style.width = `${Math.min(100, percent)}%`;
            document.getElementById('progress-bar').style.backgroundColor = getSpeedColor(smoothedSpeed);
            document.getElementById('speed-dot').style.backgroundColor = getSpeedColor(smoothedSpeed);
            document.getElementById('progress-elapsed').textContent = formatTime(elapsed);
            document.getElementById('progress-remaining').textContent = timeRemaining;

            progressState.lastUpdateTime = now;
            progressState.lastBytes = loaded;
        };

        // Override the startDownload function to track progress
        window.startDownload = function(url) {
            progressState = {
                startTime: 0,
                lastUpdateTime: 0,
                lastBytes: 0,
                speedHistory: [],
            };

            const xhr = new XMLHttpRequest();
            
            xhr.addEventListener('loadstart', () => {
                const filename = url.split('/').pop().split('?')[0] || 'file';
                updateProgress(filename, 0, xhr.total || 0);
            });

            xhr.addEventListener('progress', (e) => {
                if (e.lengthComputable) {
                    const filename = url.split('/').pop().split('?')[0] || 'file';
                    updateProgress(filename, e.loaded, e.total);
                }
            });

            xhr.addEventListener('loadend', () => {
                if (xhr.status === 200) {
                    // Download complete - create blob and trigger download
                    const blob = xhr.response;
                    const filename = url.split('/').pop().split('?')[0] || 'file';
                    const link = document.createElement('a');
                    link.href = window.URL.createObjectURL(blob);
                    link.download = filename;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    window.URL.revokeObjectURL(link.href);

                    // Hide progress after 2 seconds
                    setTimeout(() => {
                        document.getElementById('progress-container').classList.remove('active');
                        progressState = {
                            startTime: 0,
                            lastUpdateTime: 0,
                            lastBytes: 0,
                            speedHistory: [],
                        };
                    }, 2000);
                }
            });

            xhr.addEventListener('error', () => {
                document.getElementById('progress-container').classList.remove('active');
                alert('Download failed');
            });

            xhr.responseType = 'blob';
            xhr.open('GET', url);
            xhr.send();
        };

        // ── Heartbeat ────────────────────────────────────────────────────────
        // Fires immediately on load (fast device_connected) then every 5s.
        // On 403/401 the server has restarted; we reload to reconnect without
        // needing a rescan.
        let _reloading = false;
        function heartbeat() {
            if (_reloading) return;
            const url = TOKEN ? `/heartbeat?token=${TOKEN}` : '/heartbeat';
            fetch(url, { method: 'POST' })
                .then(r => {
                    if (r.status === 401 || r.status === 403) {
                        _reloading = true;
                        setTimeout(() => location.reload(), 800);
                    }
                })
                .catch(() => { });
        }
        setInterval(heartbeat, 5000);
        heartbeat();
    </script>
