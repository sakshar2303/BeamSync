<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BeamSync Downlink</title>
    <style>
        :root {
            --bg: #060a06;
            --primary: #ffb000;
            --glass: rgba(255, 176, 0, 0.08);
            --border: rgba(255, 176, 0, 0.35);
            --dim: rgba(255, 176, 0, 0.4);
            --scanline: rgba(255, 176, 0, 0.04);
        }

        * {
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--primary);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .scanlines {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg,
                    rgba(0, 0, 0, 0) 0px,
                    rgba(0, 0, 0, 0) 1px,
                    var(--scanline) 1px,
                    var(--scanline) 2px);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
        }

        header {
            text-align: center;
            padding-bottom: 16px;
            margin-bottom: 28px;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 2rem;
            margin-bottom: 4px;
        }

        h1 {
            margin: 0;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px var(--primary);
            font-weight: normal;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--dim);
            margin-top: 4px;
        }

        .file-card {
            border: 1px solid var(--border);
            background: var(--glass);
            margin-bottom: 12px;
            padding: 18px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            animation: fadeIn 0.4s ease;
            transition: background 0.2s;
        }

        .file-card:hover {
            background: rgba(255, 176, 0, 0.12);
        }

        .file-card__icon {
            font-size: 2rem;
            flex-shrink: 0;
        }

        .file-card__info {
            flex: 1;
            overflow: hidden;
        }

        .file-card__name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 1.15rem;
            margin-bottom: 2px;
        }

        .file-card__hint {
            font-size: 0.85rem;
            color: var(--dim);
        }

        .download-btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 12px 18px;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            flex-shrink: 0;
            transition: background 0.2s;
            letter-spacing: 0.05em;
        }

        .download-btn:hover {
            background: #fff;
        }

        .download-btn:active {
            transform: scale(0.97);
        }

        .empty-msg {
            text-align: center;
            color: var(--dim);
            margin-top: 60px;
            font-size: 1.1rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="scanlines"></div>
    <div class="container">
        <header>
            <div class="logo">⬡</div>
            <h1>BEAMSYNC</h1>
            <div class="subtitle">// DOWNLINK_NODE — TAP TO SAVE</div>
        </header>

        <div id="file-list">
            {{FILES}}
        </div>
    </div>

    <script>
        // Token is embedded in the URL query string by Go: /download?token=XXX
        const TOKEN = new URLSearchParams(location.search).get('token') || '';

        // ── Heartbeat ────────────────────────────────────────────────────────
        // Fires immediately on load (fast device_connected) then every 5s.
        // On 403/401 the server has restarted; we reload to reconnect without
        // needing a rescan.
        let _reloading = false;
        function heartbeat() {
            if (_reloading) return;
            const url = TOKEN ? `/heartbeat?token=${TOKEN}` : '/heartbeat';
            fetch(url, { method: 'POST' })
                .then(r => {
                    if (r.status === 401 || r.status === 403) {
                        _reloading = true;
                        setTimeout(() => location.reload(), 800);
                    }
                })
                .catch(() => { });
        }
        setInterval(heartbeat, 5000);
        heartbeat();
    </script>

</body>

</html>
